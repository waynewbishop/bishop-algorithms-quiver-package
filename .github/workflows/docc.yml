name: Deploy DocC to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build DocC
        run: |
          xcodebuild docbuild \
            -scheme Quiver \
            -derivedDataPath /tmp/docbuild \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO

          ARCHIVE=$(find /tmp/docbuild -name 'Quiver.doccarchive' | head -1)

          $(xcrun --find docc) process-archive transform-for-static-hosting "$ARCHIVE" \
            --hosting-base-path bishop-algorithms-quiver-package \
            --output-path ./docs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
